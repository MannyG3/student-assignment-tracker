<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Assignment Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>Student Assignment Tracker</h1>
        <p class="subtitle">Add students, track assignment status, and keep records synced through the API.</p>

        <form id="studentForm" class="student-form" novalidate>
          <div class="field-row">
            <label for="rollNo">Roll Number</label>
            <input id="rollNo" name="rollNo" type="text" required />
          </div>
          <div class="field-row">
            <label for="name">Student Name</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div class="assignments-grid">
            <label><input type="checkbox" data-assignment="assignment1" /> Assignment 1</label>
            <label><input type="checkbox" data-assignment="assignment2" /> Assignment 2</label>
            <label><input type="checkbox" data-assignment="assignment3" /> Assignment 3</label>
            <label><input type="checkbox" data-assignment="assignment4" /> Assignment 4</label>
            <label><input type="checkbox" data-assignment="assignment5" /> Assignment 5</label>
          </div>
          <button type="submit" class="primary">Add Student</button>
        </form>
      </section>

      <section class="panel table-panel">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>A1</th>
                <th>A2</th>
                <th>A3</th>
                <th>A4</th>
                <th>A5</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
